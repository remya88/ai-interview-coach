version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_interview_coach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  api:
    build:
      context: ../
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_interview_coach
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'

  web:
    build:
      context: ../
      dockerfile: Dockerfile.web
    ports:
      - '4200:4200'
